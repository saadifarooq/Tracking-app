<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin Login</title><style>body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f5f7fb;color:#172033}.wrap{max-width:520px;margin:80px auto;padding:0 18px}.card{background:white;border-radius:18px;padding:24px;box-shadow:0 8px 28px rgba(17,31,61,.08)}input{width:100%;box-sizing:border-box;font-size:18px;padding:14px 16px;border:1px solid #d3d9e6;border-radius:12px;margin:12px 0}button{border:0;padding:14px 18px;border-radius:12px;cursor:pointer;font-weight:700;background:#1f6feb;color:white;width:100%}.msg{padding:12px 14px;border-radius:12px;margin:12px 0;background:#fff0f0;color:#9b1c1c}a{color:#1f6feb;text-decoration:none;font-weight:700}</style></head><body><main class="wrap"><section class="card"><h1>Admin Login</h1><p>Enter the admin password to upload the daily PO/order file.</p>{% with messages = get_flashed_messages(with_categories=true) %}{% for category, message in messages %}<div class="msg">{{ message }}</div>{% endfor %}{% endwith %}<form method="post"><input type="password" name="password" placeholder="Admin password" required autofocus><button type="submit">Login</button></form><p><a href="/">Back to employee search</a></p></section></main></body></html>
